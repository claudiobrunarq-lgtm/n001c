<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#efe7df" />
  <title>Arquitectura del Encuentro</title>
  <link rel="manifest" href="./manifest.json" />
  <link rel="icon" href="./icon-192.png" />
  <link rel="apple-touch-icon" href="./icon-192.png" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div id="app" class="app-shell">
    <main id="view" class="view"></main>
    <nav class="dock" aria-label="Espacios">
      <button data-route="home" class="dock-item active"><span>⌂</span><small>Casa</small></button>
      <button data-route="bedroom" class="dock-item"><span>☕</span><small>Hab.</small></button>
      <button data-route="mirror" class="dock-item"><span>◐</span><small>Espejo</small></button>
      <button data-route="bridge" class="dock-item"><span>≈</span><small>Puente</small></button>
      <button data-route="lab" class="dock-item"><span>◇</span><small>Lab</small></button>
      <button data-route="garden" class="dock-item"><span>✦</span><small>Jardín</small></button>
    </nav>
  </div>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>
  <script src="./firebase-config.js"></script>
  <script src="./app.js"></script>
</body>
</html>
